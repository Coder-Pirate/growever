name: CI/CD Pipeline
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: '@Minhaz_1332!M'
          MYSQL_DATABASE: growever
          MYSQL_USER: growever
          MYSQL_PASSWORD: '@Minhaz_1332!M'
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping -h localhost -u growever -p@Minhaz_1332!M" --health-interval=10s --health-timeout=5s --health-retries=5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.4
          extensions: mbstring, xml, ctype, iconv, intl, pdo_mysql, dom, filter, gd, iconv, json, mbstring, pdo

      - name: Copy Environment File
        run: cp .env.example .env

      - name: Configure Database for CI
        run: |
          sed -i 's/DB_CONNECTION=sqlite/DB_CONNECTION=mysql/' .env
          sed -i "s/# DB_HOST=127.0.0.1/DB_HOST=127.0.0.1/" .env
          sed -i "s/# DB_PORT=3306/DB_PORT=3306/" .env
          sed -i "s/# DB_DATABASE=laravel/DB_DATABASE=growever/" .env
          sed -i "s/# DB_USERNAME=root/DB_USERNAME=growever/" .env
          sed -i "s/# DB_PASSWORD=/DB_PASSWORD=@Minhaz_1332!M/" .env

      - name: Install Composer Dependencies
        run: composer install --optimize-autoloader --no-progress --no-interaction --prefer-dist

      - name: Generate Application Key
        run: php artisan key:generate

      - name: Wait for MySQL to be ready
        run: |
          until mysqladmin ping -h127.0.0.1 -ugrowever -p'@Minhaz_1332!M' --silent; do
            echo 'Waiting for MySQL...'
            sleep 2
          done
          echo 'MySQL is ready!'

      - name: Setup Database for Build
        run: php artisan migrate --force

      - name: Install Node
        uses: actions/setup-node@v3
        with:
          node-version: '25'

      - name: Install NPM Dependencies
        run: npm install

      - name: Generate Wayfinder Types
        run: php artisan wayfinder:generate --with-form

      - name: Build NPM Assets
        run: npm run build

      # - name: Remove Old Build Files on Server
      #   uses: appleboy/ssh-action@v0.1.6
      #   with:
      #     host: ${{ secrets.VPS_HOST }}
      #     username: ${{ secrets.VPS_USER }}
      #     password: ${{ secrets.VPS_PASSWORD }}
      #     script: |
      #       rm -rf /var/www/html/growever/public/build
      #       rm -rf /var/www/html/growever/bootstrap/cache/*.php
      #       rm -rf /var/www/html/growever/database/migrations/*.php

      - name: Synchronize Files To Server
        uses: appleboy/scp-action@v0.1.1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          source: '.'
          target: '/var/www/html/growever/'

      - name: Run Remote/Artisan Commands
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            cd /var/www/html/growever
            sudo chown -R www-data:www-data /var/www/html/growever
            sudo chmod -R 775 /var/www/html/growever/storage
            sudo chmod -R 775 /var/www/html/growever/bootstrap/cache


            php artisan migrate --force
            php artisan optimize
            php artisan config:cache
            php artisan cache:clear
            php artisan route:cache
            php artisan view:cache
            php artisan migrate:fresh --seed --force
